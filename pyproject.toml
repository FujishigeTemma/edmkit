[project]
name = "edmkit"
version = "0.0.1"
description = "Simple EDM (Empirical Dynamic Modeling) library"
authors = [{ name = "FUJISHIGE TEMMA", email = "tenma.x0@gmail.com" }]
readme = "README.md"
requires-python = ">= 3.12"
dependencies = [
    "numpy>=2.3.2",
    "tinygrad>=0.11.0",
]

[dependency-groups]
dev = [
    "pyedm>=2.2.3",
    "pytest>=8.4.1",
    "ruff>=0.12.10",
    "ty>=0.0.1a19",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
