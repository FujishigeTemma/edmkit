[project]
name = "edmkit"
version = "0.0.1"
description = "Simple EDM (Empirical Dynamic Modeling) library"
authors = [{ name = "FUJISHIGE TEMMA", email = "tenma.x0@gmail.com" }]
readme = "README.md"
requires-python = ">= 3.12"
dependencies = [
    "numpy>=2.2.5",
    "tinygrad>=0.10.2",
]

[dependency-groups]
dev = [
    "pytest>=8.3.5",
    "ruff>=0.11.7",
    "ty>=0.0.1a16",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
